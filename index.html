<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Netflix</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="conteudo-principal">
        <div class="topo-conteudo">
            <h1>Quem está assistindo?</h1>
            <button type="button" id="theme-toggle" class="botao-toggle" aria-pressed="false">Modo Escuro</button>
        </div>
        <ul class="lista-perfis">
            <!-- perfil 1 -->
            <li class="item-perfil">
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-base" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-1.jpg" alt="Personagem de animação stop-motion em estilo gótico vitoriano, com feições melancólicas e vestes de veludo, posicionado em um cenário de miniatura surrealista e sombrio." width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">Perfil 1</figcaption>
                    </figure>
                </a>
            </li>

            <!-- perfil 2 -->
            <li class="item-perfil">
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-base" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-2.jpg" alt="Personagem de animação stop-motion com estética steampunk, usando capacete de aviador e barba decorada com engrenagens, em uma oficina repleta de invenções e detalhes mecânicos." width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">Perfil 2</figcaption>
                    </figure>
                </a>
            </li>

            <!-- perfil 3 -->
            <li class="item-perfil">
                <a href="catalogo/catalogo.html" class="perfil">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-base" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/perfil-3.jpg" alt="Robô de latão em estilo retrô e stop-motion, posicionado em um ateliê de costura sombrio com carretéis de linha e uma máquina de costura antiga." width="128" height="128">
                            </span>
                        </span>
                        <figcaption class="nome-perfil">Perfil 3</figcaption>
                    </figure>
                </a>
            </li>

        </ul>


        <section class="gerenciar">
            <button type="button" class="botao-gerenciar">Gerenciar perfis</button>
        </section>

    </main>

    <script src="js/index.js"></script>
</body>

</html>
